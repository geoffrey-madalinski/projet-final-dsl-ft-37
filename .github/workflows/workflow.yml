name: Dashboard CI/CD

on:
  push:
  workflow_dispatch:

jobs:
  validate-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install streamlit pandas numpy plotly joblib

      - name: Check Python syntax
        run: python -m py_compile dashboard.py

      - name: Validate imports
        run: python -c "import streamlit; import pandas; import numpy; import plotly; import joblib; print('✅ All imports successful!')"

      - name: Test dashboard startup
        run: timeout 10 streamlit run dashboard.py --logger.level=error 2>&1 | head -20 || true